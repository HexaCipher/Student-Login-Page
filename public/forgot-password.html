<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Portal — Reset Password</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

  <div class="page-wrapper">

    <!-- ── Forgot Password Card ── -->
    <main class="card" role="main">

      <!-- Back link -->
      <a href="index.html" class="back-link" aria-label="Back to sign in">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back to sign in
      </a>

      <h1 class="card-title" style="text-align:left;">Reset Password</h1>
      <p class="card-subtitle" style="text-align:left; margin-bottom:24px;">
        Enter your email and we'll send you a reset link.
      </p>

      <!-- ── Reset Form (hidden on success) ── -->
      <form id="forgot-form" novalidate>

        <div class="form-group">
          <label class="form-label" for="forgot-email">Email address</label>
          <input
            id="forgot-email"
            class="form-input"
            type="email"
            placeholder="you@example.com"
            autocomplete="email"
            inputmode="email"
          />
        </div>

        <!-- Error message -->
        <div id="forgot-error" class="msg-error" role="alert" aria-live="polite"></div>

        <!-- Send button -->
        <button id="btn-send-reset" class="btn-primary" type="button" style="margin-top:8px;">
          Send Reset Link
        </button>

      </form><!-- /#forgot-form -->

      <!-- ── Success State (shown after email is sent) ── -->
      <div id="forgot-success" class="success-state" role="status" aria-live="polite">
        <div class="success-icon">
          <!-- Checkmark icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <p class="success-title">Check your inbox</p>
        <p class="success-body">
          We've sent a password reset link to your email address.<br />
          If it doesn't arrive within a few minutes, check your spam folder.
        </p>
        <a href="index.html" class="btn-primary" style="margin-top:4px; text-decoration:none; line-height:42px; display:flex; align-items:center; justify-content:center;">
          Back to sign in
        </a>
      </div><!-- /#forgot-success -->

    </main><!-- /.card -->

  </div><!-- /.page-wrapper -->

  <!-- ── Scripts ── -->
  <script src="../config/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase.js"></script>
  <script src="../assets/js/auth.js"></script>

</body>
</html>
